version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: notif-postgres
    environment:
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
      POSTGRES_DB: notification_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: notif-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notif-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: notif-jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: notif-migrate
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: notification
      DB_PASSWORD: notification
      DB_NAME: notification_db
      DB_SSL_MODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: notif-api
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: notification
      DB_PASSWORD: notification
      DB_NAME: notification_db
      DB_SSL_MODE: disable
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_ADDR: "redis:6379"
      PROVIDER_WEBHOOK_URL: "${PROVIDER_WEBHOOK_URL:-https://webhook.site/your-uuid-here}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4318"
      OTEL_SERVICE_NAME: "notify-engine-api"
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: notif-worker
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: notification
      DB_PASSWORD: notification
      DB_NAME: notification_db
      DB_SSL_MODE: disable
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_ADDR: "redis:6379"
      PROVIDER_WEBHOOK_URL: "${PROVIDER_WEBHOOK_URL:-https://webhook.site/your-uuid-here}"
      WORKER_CONCURRENCY: "5"
      WORKER_MAX_RETRIES: "3"
      WORKER_RATE_LIMIT_PER_SEC: "100"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4318"
      OTEL_SERVICE_NAME: "notify-engine-worker"
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
